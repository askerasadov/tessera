[versions]
kotlin = "2.1.0"
spotless = "6.25.0"
ktlint = "1.3.1"
kotest = "5.9.1"

[libraries]
kotest-property = { module = "io.kotest:kotest-property", version.ref = "kotest" }

[plugins]
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
