# Continuous integration: runs `./gradlew check` on every PR to main and on
# every push to main. This workflow exists so the branch-protection rule
# "Require status checks to pass before merging" has something meaningful to
# wait on.
#
# Scope:
# - Runs the JVM `check` only. As of 0.2.0's build-foundation slices the core
#   modules declare both an Android target and the three iOS targets (ADR-017),
#   but `gradle check` on this ubuntu runner compiles neither: the Android
#   target compiles via `assemble`/`build` (not `check`) and CI has no Android
#   SDK provisioned, and the iOS targets need a macOS runner with Xcode (a Linux
#   runner cannot build Apple targets at all). Compiling the mobile targets on
#   CI is tracked in docs/open-questions.md ("CI and repository hardening for
#   the mobile build"). JS / Wasm remain per-release-activated per
#   docs/scope.md "Supported Platforms".
# - JDK 21 to match each module's jvmToolchain(21)
# - Gradle 9.5.1 via the project's wrapper

name: check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: gradle check (JVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Read-only cache for PR runs; main runs may write fresh entries.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run gradle check
        run: ./gradlew check

      - name: Run cross-reference validator
        run: bash scripts/check-cross-references.sh

      - name: Run markdown link validator
        run: bash scripts/check-markdown-links.sh
