# Continuous integration: runs `./gradlew check` on every PR to main and on
# every push to main. This workflow exists so the branch-protection rule
# "Require status checks to pass before merging" has something meaningful to
# wait on.
#
# Scope:
# - The `check` job runs the JVM `check` only — it does not compile the mobile
#   targets. `gradle check` excludes the Android target (which compiles via
#   `assemble`/`compileAndroidMain`, not `check`) and the iOS targets (which need
#   a macOS runner with Xcode — a Linux runner cannot build Apple targets at all).
# - The `android-compile` job (added at 0.2.0's mrz-camera-android slice) compiles
#   every module's Android target on a Linux runner with the Android SDK, so the
#   ML Kit / CameraX code in androidMain is type-checked on CI. It is compile-only:
#   no emulator, no instrumented tests (those run locally / on a device).
# - The `ios-compile` job (added at 0.2.0's mrz-camera-ios slice) compiles every
#   module's iOS targets on a macOS runner — the only runner that can build Apple
#   targets — and runs the iosSimulatorArm64 host tests. It type-checks the
#   commonMain/iosMain code (the core modules' iOS targets and, from the iOS camera
#   slice, the AVFoundation/Vision code) that the Linux jobs cannot. Device/live-camera
#   runs are local/manual; the Simulator has no camera.
# - JS / Wasm remain per-release-activated per docs/scope.md "Supported Platforms".
# - JDK 21 to match each module's jvmToolchain(21); the Gradle daemon is pinned to
#   JDK 17 (gradle/gradle-daemon-jvm.properties, foojay-provisioned).
# - Gradle 9.5.1 via the project's wrapper

name: check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: gradle check (JVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Read-only cache for PR runs; main runs may write fresh entries.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run gradle check
        run: ./gradlew check

      - name: Run cross-reference validator
        run: bash scripts/check-cross-references.sh

      - name: Run markdown link validator
        run: bash scripts/check-markdown-links.sh

  android-compile:
    name: android compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # ubuntu-latest ships the Android SDK (ANDROID_SDK_ROOT set) with recent platforms preinstalled
      # — including the compileSdk used here, whose platform directory and sdkmanager package id are
      # `android-37.0` (the API-37 platform carries a `.0` revision). So this is normally a no-op; the
      # guarded install is only a fallback for a future runner image that drops android-37.0. Using
      # the preinstalled sdkmanager keeps CI on first-party actions only (no third-party
      # setup-android action on the supply chain). AGP resolves build-tools itself.
      - name: Ensure Android SDK platform 37
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "--- platforms present ---"; ls -1 "$ANDROID_SDK_ROOT/platforms" 2>/dev/null || echo "(none)"
          if [ ! -d "$ANDROID_SDK_ROOT/platforms/android-37.0" ] && [ ! -d "$ANDROID_SDK_ROOT/platforms/android-37" ]; then
            # `yes` feeds the license prompts; its broken-pipe on the reader's exit is harmless, hence 2>/dev/null.
            yes 2>/dev/null | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" --install "platforms;android-37.0"
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Compiles every module's androidMain (the core modules and mrz-camera-android's ML Kit
      # recognizer). Compile-only — the host tests run in the `check` job via each module's jvm target.
      - name: Compile Android targets
        run: ./gradlew compileAndroidMain

  ios-compile:
    name: ios compile
    # Apple targets can only be built on macOS (Kotlin/Native links against the Xcode toolchain);
    # a Linux runner cannot build them at all. macos-latest ships a current Xcode, which Konan uses.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # Kotlin/Native keeps its toolchain (a bundled LLVM + libffi, ~1.4 GB) and downloaded
      # platform dependencies under ~/.konan. Without this cache every run re-downloads them.
      # The toolchain version tracks the Kotlin version, so the version catalog is the cache key;
      # restore-keys lets a Kotlin bump fall back to the previous toolchain while it re-provisions.
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Compiles every module's iOS targets and runs the common host tests on the simulator.
      # iosSimulatorArm64Test compiles + runs (the simulator executes Apple-Silicon test binaries);
      # the iosArm64 (device) and iosX64 (Intel simulator) targets are compile-only here — neither
      # can execute on an Apple-Silicon runner — but compiling them catches target-specific breaks.
      - name: Compile iOS targets and run simulator tests
        run: ./gradlew iosSimulatorArm64Test compileKotlinIosArm64 compileKotlinIosX64
